<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SAVY — Page introuvable</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#EEF7F3;--card:#E5F1EB;--green:#089929;--text:#0D1F18;--sub:#4A7A66;--muted:#8FBFAA;--border:#D4EDE3;}
@media(prefers-color-scheme:dark){:root{--bg:#060E0A;--card:#0C1810;--text:#E8F5F0;--sub:#7BBFA6;--muted:#3D7A62;--border:#162B1D;}}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.code{font-family:'Syne',sans-serif;font-weight:800;font-size:96px;line-height:1;letter-spacing:-6px;color:var(--green);opacity:.18;margin-bottom:-20px;}
.bot{font-size:52px;margin-bottom:8px;}
h1{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.6px;color:var(--text);margin-bottom:8px;}
p{font-size:13px;color:var(--sub);line-height:1.6;max-width:280px;margin-bottom:28px;}
.actions{display:flex;flex-direction:column;gap:10px;width:100%;max-width:260px;}
.btn-primary{display:block;padding:13px;border-radius:99px;background:linear-gradient(135deg,#089929,#2BCE4E);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;text-decoration:none;box-shadow:0 4px 18px rgba(9,153,41,.25);}
.btn-secondary{display:block;padding:12px;border-radius:99px;background:var(--card);border:1px solid var(--border);color:var(--sub);font-size:12px;font-weight:600;text-decoration:none;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:99px;background:#25D366;color:#fff;font-size:12px;font-weight:700;text-decoration:none;}
</style>
</head>
<body>
  <div class="code">404</div>
  <div class="bot">🤖</div>
  <h1>Page introuvable</h1>
  <p>Cette page n'existe pas ou a été déplacée. Le Chef SAVY peut quand même t'aider !</p>
  <div class="actions">
    <a href="/" class="btn-primary">🏠 Retour à l'accueil</a>

</body>
</html>
