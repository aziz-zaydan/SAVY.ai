<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>SAVY – Meal Engineer | الشيف الذكي</title>
  <meta name="description" content="SAVY – Morocco's first AI Personal Chef. Specially Engineered meals, delivered in 45 min. Tétouan · M'diq · Martil."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      overflow-x:hidden;
      --bg:       #EEF7F3;
      --card:     #EAF6EF;
      --mint:     #DFF0E9;
      --green:    #089929;
      --greenL:   #2BCE4E;
      --greenXL:  #E6F5EF;
      --text:     #0D1F18;
      --sub:      #4A7A66;
      --muted:    #8FBFAA;
      --border:   #D4EDE3;
      --pink:     #E91E8C;
      --pinkL:    #FF4DB8;
      --pinkXL:   #FFF0F9;
      --pinkBorder:#FFB3E0;
      --orange:   #F4A330;
      --orangeBg: #FFF3E0;
      --shadow:   0 2px 16px rgba(9,184,48,0.08);
      --shadowH:  0 8px 32px rgba(9,184,48,0.15);
      --glow:     0 0 0 3px rgba(9,184,48,0.15);
      --navbar-bg: rgba(238,247,243,0.97);
    }

    /* ── DARK THEME ── */
    [data-theme="dark"] {
      --bg:       #050E09;
      --card:     #0C1A0F;
      --mint:     #0D2016;
      --green:    #2BCE4E;
      --greenL:   #3DD660;
      --greenXL:  #0A2016;
      --text:     #E8F5F0;
      --sub:      #7BBFA6;
      --muted:    #3D7A62;
      --border:   #153024;
      --pinkXL:   #1A0510;
      --orangeBg: #1A0F00;
      --shadow:   0 2px 16px rgba(0,0,0,0.4);
      --shadowH:  0 8px 32px rgba(9,184,48,0.2);
      --navbar-bg: rgba(5,14,9,0.97);
    }
    [data-theme="dark"] #navbar      { background:var(--navbar-bg); }
    [data-theme="dark"] .lang-wrap   { background:var(--card); }
    [data-theme="dark"] #hero        { background:radial-gradient(ellipse 80% 60% at 70% 50%, rgba(9,184,48,0.1) 0%, transparent 70%), var(--bg); }
    [data-theme="dark"] #how         { background:var(--card); }
    [data-theme="dark"] #menu        { background:var(--card); }
    [data-theme="dark"] #final       { background:linear-gradient(135deg, #0A2016, var(--bg)); }
    [data-theme="dark"] footer       { background:var(--card); }
    [data-theme="dark"] .step-card   { background:var(--card); }
    [data-theme="dark"] .stat-card   { background:var(--card); }
    [data-theme="dark"] .dish-card   { background:var(--card); }
    [data-theme="dark"] .chip        { background:var(--card); }
    [data-theme="dark"] .persona-card{ background:var(--mint); border-color:var(--border); }
    [data-theme="dark"] .email-inp   { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .search-inp  { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .social-btn  { background:var(--card); }
    [data-theme="dark"] #chat-window { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] #chat-msgs   { background:var(--bg); }
    [data-theme="dark"] .msg-bot .msg-bubble { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .chat-input-area { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .chat-inp    { background:var(--bg); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .persona-select { background:var(--mint); border-color:var(--border); }
    [data-theme="dark"] .p-btn       { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .q-chip      { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] #chat-lead-form { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .lead-inp    { background:var(--bg); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] #persona-highlight { background:var(--card) !important; }
    [data-theme="dark"] .tag-cuisine { background:var(--mint); color:var(--muted); }
    [data-theme="dark"] #banner      { background:var(--green); }

    /* ═══════════════════════════════════════════
       WHATSAPP FLOATING BUTTON
    ═══════════════════════════════════════════ */
    /* ═══════════════════════════════════════════
       FAB GROUP — SAVY + WhatsApp side by side
    ═══════════════════════════════════════════ */
    /* ── COMBINED SPEED-DIAL FAB ── */
    #fab-main-wrap {
      position:fixed; bottom:22px; right:16px; z-index:999;
    }
    #fab-main {
      width:58px; height:58px; border-radius:50%; border:none; cursor:pointer;
      background:linear-gradient(135deg,#089929,#089929);
      box-shadow:0 8px 32px rgba(9,184,48,0.5);
      display:flex; align-items:center; justify-content:center;
      transition:transform .25s, box-shadow .25s;
      animation:savyPulse 2.5s ease-in-out infinite;
      position:relative;
    }
    #fab-main:hover { transform:scale(1.08); box-shadow:0 12px 36px rgba(9,184,48,0.65); }
    @keyframes savyPulse {
      0%,100%{box-shadow:0 8px 32px rgba(9,184,48,.5)}
      50%{box-shadow:0 8px 40px rgba(9,184,48,.75), 0 0 0 8px rgba(9,184,48,.1)}
    }
    .fab-savy-badge {
      position:absolute; top:-3px; right:-3px;
      width:17px; height:17px; background:var(--pink);
      border-radius:50%; border:2px solid var(--card);
      font-size:8px; font-weight:900; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; pointer-events:none;
    }
    #fab-group { display:none; }

    /* ── STICKY WHATSAPP PILL ────────────────────────────── */
    #wa-sticky {
      position:fixed; left:16px; bottom:28px; z-index:998;
      background:linear-gradient(135deg,#25D366,#128C7E);
      color:#fff; border-radius:99px;
      display:flex; align-items:center; gap:8px;
      padding:10px 16px 10px 12px;
      font-size:12px; font-weight:700; font-family:'DM Sans',sans-serif;
      box-shadow:0 6px 24px rgba(37,211,102,0.45);
      cursor:pointer; transition:transform .2s, box-shadow .2s;
      white-space:nowrap;
      animation:waPulse 3s ease-in-out infinite;
    }
    #wa-sticky:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 10px 32px rgba(37,211,102,0.6); }
    @keyframes waPulse {
      0%,100% { box-shadow:0 6px 24px rgba(37,211,102,0.45); }
      50%      { box-shadow:0 6px 32px rgba(37,211,102,0.7); }
    }
    @media(max-width:480px){ #wa-sticky-lbl { display:none; } #wa-sticky { padding:10px; } }

    /* ── EXIT INTENT POPUP ───────────────────────────────── */
    /* ── DISH MODAL OVERLAY ── */
    #dish-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      z-index:1050; display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(6px); padding:16px;
    }
    #dish-modal-overlay.open { display:flex; }
    #dish-modal {
      background:var(--card); border-radius:20px;
      width:min(460px,94vw); max-height:88vh; overflow-y:auto;
      box-shadow:0 24px 64px rgba(0,0,0,.22);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both;
      position:relative;
    }

    /* ── ORDER MODAL OVERLAY ── */
    #order-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      z-index:1050; display:none; align-items:flex-end; justify-content:center;
      backdrop-filter:blur(6px);
      overflow:hidden;
    }
    /* Keyboard-aware: push modal up when keyboard opens on mobile */
    @supports (height: 100dvh) {
      #order-modal-overlay.open { align-items: flex-end; }
    }
    #order-modal-overlay.open { display:flex; }
    #order-modal {
      background:var(--card);
      border-radius:24px 24px 0 0;
      width:100%; max-width:480px;
      max-height:92dvh; overflow-y:auto;
      padding:28px 24px 36px;
      position:relative;
      box-shadow:0 -8px 40px rgba(0,0,0,.2);
      animation:slideUpSheet .32s cubic-bezier(.34,1.2,.64,1) both;
      will-change:margin-bottom;
    }
    @keyframes slideUpSheet {
      from { transform:translateY(100%); opacity:0; }
      to   { transform:translateY(0);    opacity:1; }
    }
    /* drag handle */
    #order-modal::before {
      content:''; display:block;
      width:40px; height:4px; border-radius:99px;
      background:var(--border); margin:-12px auto 18px;
    }

    /* ── EXIT OVERLAY ── */
    #exit-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      z-index:1100; display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(6px);
    }
    #exit-overlay.open { display:flex; }
    #exit-modal {
      background:var(--card); border-radius:24px; width:min(380px,92vw);
      padding:32px 28px; text-align:center; position:relative;
      box-shadow:0 24px 64px rgba(0,0,0,.2);
      animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    #exit-close {
      position:absolute; top:14px; right:16px;
      background:none; border:none; font-size:16px; color:var(--muted);
      cursor:pointer; line-height:1;
    }

    /* ── URGENCY STRIP ───────────────────────────────────── */
    #urgency-strip {
      background: linear-gradient(90deg, #089929, #0db830, #089929);
      background-size: 200% 100%;
      animation: urgencySlide 18s linear infinite;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      padding: 11px 16px;
      letter-spacing: .02em;
      position: sticky;
      top: 0;
      z-index: 201;
    }
    @keyframes urgencySlide {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    #urgency-inner { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
    #urgency-strip strong { font-weight:900; color:#a7f3d0; }
    #urgency-sep { opacity:.5; }
    @media(max-width:500px){ #urgency-slots { display:none; } #urgency-sep { display:none; } }

    #navbar {
      position:sticky; top:36px; z-index:200;
      background:var(--navbar-bg); backdrop-filter:blur(16px);

      padding:0 clamp(16px,4vw,56px); height:66px;
      display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
      transition:box-shadow .3s;
    }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-logo span { font-family:'Syne',sans-serif; font-weight:900; font-size:20px; color:var(--text); }
    .nav-links { display:flex; gap:24px; }
    .nav-link { color:var(--sub); font-size:13px; font-weight:600; background:none; border:none; cursor:pointer; transition:color .2s; text-decoration:none; }
    .nav-link:hover { color:var(--green); }
    .lang-wrap { display:flex; gap:1px; background:var(--card); border-radius:99px; padding:2px; border:1px solid var(--border); }
    .lang-btn { padding:6px 10px; border-radius:99px; border:none; cursor:pointer; font-size:12px; font-weight:700; transition:all .2s; background:transparent; color:var(--sub); font-family:'DM Sans',sans-serif; }
    .lang-btn.active { background:var(--green); color:#fff; }
    .btn-cta {
      background:var(--green); color:#fff; border:none; cursor:pointer;
      border-radius:14px; padding:14px 26px; font-size:14px; font-weight:700;
      display:inline-flex; align-items:center; gap:8px;
      box-shadow:0 6px 24px rgba(9,184,48,0.2); transition:all .25s;
      font-family:'DM Sans',sans-serif; text-decoration:none;
    }
    .btn-cta:hover { background:var(--greenL); transform:translateY(-2px); box-shadow:0 10px 32px rgba(9,184,48,.3); }
    .btn-cta-sm {
      padding:11px 22px; font-size:15px; border-radius:12px;
      font-weight:900; letter-spacing:.03em;
      animation: ctaPulse 2.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(9,184,48,0); transform: scale(1); }
      50%      { box-shadow: 0 0 0 6px rgba(9,184,48,0.2); transform: scale(1.03); }
    }

    /* ── ANNOUNCEMENT BANNER ── */
    #banner {
      background:var(--green); color:#fff; text-align:center;
      padding:8px 16px; font-size:12px; font-weight:600;
      font-family:'DM Sans',sans-serif; letter-spacing:.02em;
    }
    #banner a { color:#fff; text-decoration:underline; margin-left:8px; cursor:pointer; }

    /* ── HERO ── */
    #hero {
      padding:36px clamp(16px,4vw,56px) 44px;
      background: linear-gradient(160deg, var(--greenXL) 0%, var(--bg) 55%, var(--mint) 100%);
      position:relative; overflow:hidden;
    }
    [data-theme="dark"] #hero {
      background: linear-gradient(160deg, #0A2016 0%, var(--bg) 55%, #0D2016 100%);
    }

    /* Subtle static accent shapes */
    #hero::before {
      content:'';
      position:absolute; top:-80px; right:-80px;
      width:320px; height:320px; border-radius:50%;
      background:radial-gradient(circle, rgba(9,184,48,0.12) 0%, transparent 70%);
      pointer-events:none;
    }
    #hero::after {
      content:'';
      position:absolute; bottom:-60px; left:-40px;
      width:240px; height:240px; border-radius:50%;
      background:radial-gradient(circle, rgba(9,184,48,0.08) 0%, transparent 70%);
      pointer-events:none;
    }

    /* ── HERO STATIC BG ── */
    #hero-canvas { display:none; }
    .food-float  { display:none; }
    .hex-grid    { display:none; }
    .orb         { display:none; }
    .dot-grid    { display:none; }
    .hero-inner {
      max-width:1100px; margin:0 auto; position:relative; z-index:2;
      display:grid; grid-template-columns:1.15fr 1fr; gap:56px; align-items:center;
    }
    .city-badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 14px; border-radius:99px;
      background:var(--greenXL); border:1px solid var(--border); margin-bottom:16px;
    }
    .city-dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 1.5s infinite; }
    .city-badge span.label { color:var(--green); font-size:12px; font-weight:700; }
    h1.hero-title { font-size:clamp(38px,5.5vw,68px); font-weight:700; line-height:1.08; color:var(--text); margin-bottom:16px; }
    h1.hero-title .accent { color:var(--green); }
    .hero-sub { font-size:15px; line-height:1.85; color:var(--sub); max-width:480px; margin-bottom:20px; }

    /* ── PACKAGING SLIDESHOW ── */
    .pkg-slideshow {
      position:relative; width:100%; max-width:480px;
      border-radius:20px; overflow:hidden;
      margin-bottom:28px;
      box-shadow:0 12px 40px rgba(9,184,48,0.18);
      aspect-ratio:4/3;
      background:var(--mint);
    }
    .slides-track { width:100%; height:100%; position:relative; }
    .slide {
      position:absolute; inset:0;
      opacity:0; transition:opacity 0.7s ease;
      pointer-events:none;
    }
    .slide.active { opacity:1; pointer-events:auto; }
    .slide img { width:100%; height:100%; object-fit:cover; display:block; }
    .slide-btn {
      position:absolute; top:50%; transform:translateY(-50%);
      background:rgba(255,255,255,0.85); border:none; cursor:pointer;
      width:36px; height:36px; border-radius:50%;
      font-size:22px; line-height:1; color:#0D1F18;
      box-shadow:0 2px 12px rgba(0,0,0,0.15);
      display:flex; align-items:center; justify-content:center;
      transition:background .2s; z-index:10;
    }
    .slide-btn:hover { background:#fff; }
    .slide-btn.prev { left:10px; }
    .slide-btn.next { right:10px; }
    .slide-dots {
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      display:flex; gap:6px; z-index:10;
    }
    .slide-dot {
      width:8px; height:8px; border-radius:50%;
      background:rgba(255,255,255,0.5); cursor:pointer;
      transition:background .3s, transform .3s;
    }
    .slide-dot.active { background:#fff; transform:scale(1.3); }
    /* social proof */
    .proof { display:flex; align-items:center; gap:14px; margin-top:24px; }
    .avatars { display:flex; }
    .av { width:30px; height:30px; border-radius:50%; border:2.5px solid var(--bg); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
    [dir="ltr"] .avatars .av:not(:first-child) { margin-left:-10px; }
    [dir="rtl"] .avatars .av:not(:first-child) { margin-right:-10px; }
    .proof-text { font-size:13px; font-weight:600; color:var(--text); }
    .proof-text em { color:var(--green); font-style:normal; }
    .proof-stars { font-size:13px; color:#F59E0B; margin-top:2px; letter-spacing:2px; }
    /* hero right */
    .hero-right { display:flex; flex-direction:column; align-items:center; gap:18px; }
    .robot-float { animation:float 3.5s ease-in-out infinite; filter:drop-shadow(0 16px 40px rgba(9,184,48,.2)); }
    .stat-chips { display:flex; gap:10px; }
    .chip { padding:12px 14px; border-radius:16px; text-align:center; background:var(--card); border:1px solid var(--border); box-shadow:var(--shadow); }
    .chip-val { font-family:'Syne',sans-serif; color:var(--green); font-weight:800; font-size:14px; margin-top:3px; }
    .chip-lbl { color:var(--muted); font-size:10px; margin-top:1px; }

    /* ── PERSONA CARDS ── */
    .persona-intro { margin-bottom:12px; }
    .persona-intro p { font-size:11px; color:var(--muted); margin-bottom:8px; font-weight:600; }
    .persona-cards { display:flex; gap:10px; flex-wrap:wrap; }
    .persona-card {
      flex:1; min-width:100px; padding:9px 8px; border-radius:14px;
      border:2px solid var(--border); background:var(--greenXL); cursor:pointer;
      transition:all .25s; text-align:center; position:relative; overflow:hidden;
    }
    .persona-card:hover { transform:translateY(-3px); box-shadow:var(--shadowH); border-color:var(--green); }
    /* Active — full solid color fill */
    .persona-card.active-employee { border-color:#1E40AF;        background:#1E40AF;        }
    .persona-card.active-sportif  { border-color:#D97706;        background:#D97706;        }
    .persona-card.active-famille  { border-color:#0D9488;        background:#0D9488;        }
    .persona-card.active-couple   { border-color:var(--pink);    background:var(--pink);    }
    /* White text + emoji shadow when active */
    .persona-card.active-employee .persona-label,
    .persona-card.active-sportif  .persona-label,
    .persona-card.active-famille  .persona-label,
    .persona-card.active-couple   .persona-label { color:#fff; }
    .persona-card.active-employee .persona-desc,
    .persona-card.active-sportif  .persona-desc,
    .persona-card.active-famille  .persona-desc,
    .persona-card.active-couple   .persona-desc  { color:rgba(255,255,255,0.8); }
    .persona-card.active-employee .persona-emoji,
    .persona-card.active-sportif  .persona-emoji,
    .persona-card.active-famille  .persona-emoji,
    .persona-card.active-couple   .persona-emoji { filter:drop-shadow(0 2px 6px rgba(0,0,0,0.25)); }
    .persona-emoji { font-size:20px; margin-bottom:3px; }
    .persona-label { font-family:'Syne',sans-serif; font-weight:800; font-size:11px; color:var(--text); }
    .persona-desc  { font-size:9px; color:var(--muted); margin-top:2px; line-height:1.3; }

    /* ── STEPS / HOW ── */
    #how { padding:20px clamp(16px,4vw,56px) 24px; background:var(--card); }
    .section-header { text-align:center; margin-bottom:10px; }
    .section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(30px,4.5vw,48px); font-weight:700; color:var(--text); margin-bottom:10px; }
    .title-bar { width:48px; height:4px; background:var(--green); border-radius:99px; margin:0 auto; }
    .steps-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; max-width:1100px; margin:0 auto; }
    .step-card { background:var(--card); border-radius:16px; padding:14px 14px; box-shadow:var(--shadow); border:1px solid var(--border); transition:all .2s; }
    .step-card:hover { box-shadow:var(--sha
