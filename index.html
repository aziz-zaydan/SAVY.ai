<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://*.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*; connect-src 'self' https://generativelanguage.googleapis.com;">

    <title>SAVY - AI Personal Chef</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .emerald-gradient { background: linear-gradient(135deg, #008060 0%, #004d3a 100%); }
        .chat-container { height: 450px; overflow-y: auto; scroll-behavior: smooth; }
        .savy-bubble { background-color: #e6f4f1; color: #004d3a; border-radius: 18px 18px 0 18px; }
        .user-bubble { background-color: #008060; color: white; border-radius: 18px 18px 18px 0; }
        .typing-dot { width: 6px; height: 6px; background: #008060; border-radius: 50%; display: inline-block; animation: blink 1.4s infinite both; }
        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="emerald-gradient p-5 text-white flex items-center gap-3">
            <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center border border-white/30 text-2xl">
                🤖
            </div>
            <div>
                <h1 class="font-bold text-lg">SAVY AI Chef</h1>
                <p class="text-xs text-emerald-100">مهندس وجباتك الرقمي</p>
            </div>
        </div>

        <div id="chat-box" class="chat-container p-4 space-y-4 bg-gray-50">
            <div class="flex justify-start">
                <div class="savy-bubble p-4 text-sm shadow-sm max-w-[85%]">
                    مرحباً بك في **SAVY**! 🧬 أنا الشيف الرقمي الخاص بك.
                    باش نقدر نساعدك بدقة، قولي شنو هو بروفايلك:
                    <div class="mt-3 flex flex-wrap gap-2">
                        <button onclick="quickSelect('أنا موظف وأبحث عن غداء للمكتب')" class="bg-white px-3 py-1 rounded-full border border-emerald-200 text-xs text-emerald-700 hover:bg-emerald-50 transition-all">💼 موظف</button>
                        <button onclick="quickSelect('أنا رياضي وأهتم بالماكروز والبروتين')" class="bg-white px-3 py-1 rounded-full border border-emerald-200 text-xs text-emerald-700 hover:bg-emerald-50 transition-all">🏋️ رياضي</button>
                        <button onclick="quickSelect('أنا ذواقة وأبحث عن ساندويتش عالمي')" class="bg-white px-3 py-1 rounded-full border border-emerald-200 text-xs text-emerald-700 hover:bg-emerald-50 transition-all">🍱 ذواقة</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-gray-100">
            <div class="flex gap-2">
                <input type="text" id="user-input" placeholder="تحدث مع SAVY..." 
                    class="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <button onclick="sendMessage()" class="emerald-gradient text-white p-2 rounded-full hover:opacity-90 transition-opacity">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-180" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // 2. استخدم الـ API Key الخاص بك هنا
        const API_KEY = "YOUR_GEMINI_API_KEY_HERE";
        const genAI = new GoogleGenerativeAI(API_KEY);

        // 3. برمجة ذكاء SAVY (System Instructions)
        const model = genAI.getGenerativeModel({
            model: "gemini-1.5-flash",
            systemInstruction: `أنت SAVY AI Chef. هدفك هو إقناع الزوار بالاشتراك بناءً على نوعهم:
            - الموظف: ركز على راحة المكتب، توصيل سريع، وطاقة بدون نعاس.
            - الرياضي: ركز على الماكروز (Macros)، البروتين، وبناء العضلات.
            - الذواقة: ركز على النكهات العالمية (آسيوي، مكسيكي) وتجربة الساندويتش الفاخرة.
            القاعدة: لا تنهِ الحوار إلا بعد طلب (الإسم، المدينة، ورقم الواتساب). استخدم مزيجاً من الدارجة المغربية والإنجليزية الراقية.`,
        });

        window.quickSelect = (text) => {
            document.getElementById('user-input').value = text;
            sendMessage();
        };

        window.sendMessage = async function() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputField.value.trim();

            if (!message) return;

            // إضافة رسالة المستخدم
            chatBox.innerHTML += `<div class="flex justify-end"><div class="user-bubble p-3 text-sm shadow-sm max-w-[80%] text-right">${message}</div></div>`;
            inputField.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // إظهار علامة "SAVY يفكر..."
            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="flex justify-start"><div class="savy-bubble p-3 text-sm"><span class="typing-dot"></span> <span class="typing-dot" style="animation-delay: 0.2s"></span> <span class="typing-dot" style="animation-delay: 0.4s"></span></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 4. حل مشكلة النقاط "..." بانتظار النص كاملاً
                const result = await model.generateContent(message);
                const response = await result.response;
                const text = response.text();

                // إزالة علامة التحميل وإضافة رد SAVY
                document.getElementById(loadingId).remove();
                
                // منطق عرض الصور التلقائي
                let imageHtml = '';
                if(text.includes('رياضي') || text.includes('بروتين')) {
                    imageHtml = `<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400" class="rounded-xl mt-2 border border-emerald-100" alt="Athletic Meal">`;
                } else if(text.includes('موظف') || text.includes('مكتب')) {
                    imageHtml = `<img src="https://images.unsplash.com/photo-1543353071-10c8ba85a904?w=400" class="rounded-xl mt-2 border border-emerald-100" alt="Office Lunch">`;
                }

                chatBox.innerHTML += `
                    <div class="flex justify-start">
                        <div class="savy-bubble p-4 text-sm shadow-sm max-w-[85%]">
                            ${text}
                            ${imageHtml}
                        </div>
                    </div>`;
                
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById(loadingId).innerHTML = '<div class="text-red-500 text-xs p-1">عذراً، وقع خطأ في الاتصال.</div>';
            }
        };
    </script>
</body>
</html>
