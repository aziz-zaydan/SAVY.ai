<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAVY – Meal Engineer | الشيف الذكي</title>
  <meta name="description" content="SAVY – Morocco's first AI Personal Chef. Specially Engineered meals, delivered in 45 min. Tétouan · M'diq · Martil."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #EEF7F3;
      --card:     #FFFFFF;
      --mint:     #DFF0E9;
      --green:    #008060;
      --greenL:   #00A878;
      --greenXL:  #E6F5EF;
      --text:     #0D1F18;
      --sub:      #4A7A66;
      --muted:    #8FBFAA;
      --border:   #D4EDE3;
      --pink:     #E91E8C;
      --pinkL:    #FF4DB8;
      --pinkXL:   #FFF0F9;
      --pinkBorder:#FFB3E0;
      --orange:   #F4A330;
      --orangeBg: #FFF3E0;
      --shadow:   0 2px 16px rgba(0,128,96,0.08);
      --shadowH:  0 8px 32px rgba(0,128,96,0.15);
      --glow:     0 0 0 3px rgba(0,128,96,0.15);
      --navbar-bg: rgba(238,247,243,0.97);
    }

    /* ── DARK THEME ── */
    [data-theme="dark"] {
      --bg:       #050E09;
      --card:     #0C1A0F;
      --mint:     #0D2016;
      --green:    #00A878;
      --greenL:   #00C98F;
      --greenXL:  #0A2016;
      --text:     #E8F5F0;
      --sub:      #7BBFA6;
      --muted:    #3D7A62;
      --border:   #153024;
      --pinkXL:   #1A0510;
      --orangeBg: #1A0F00;
      --shadow:   0 2px 16px rgba(0,0,0,0.4);
      --shadowH:  0 8px 32px rgba(0,168,120,0.2);
      --navbar-bg: rgba(5,14,9,0.97);
    }
    [data-theme="dark"] #navbar      { background:var(--navbar-bg); }
    [data-theme="dark"] .lang-wrap   { background:var(--card); }
    [data-theme="dark"] #hero        { background:radial-gradient(ellipse 80% 60% at 70% 50%, rgba(0,168,120,0.1) 0%, transparent 70%), var(--bg); }
    [data-theme="dark"] #how         { background:var(--card); }
    [data-theme="dark"] #menu        { background:var(--card); }
    [data-theme="dark"] #final       { background:linear-gradient(135deg, #0A2016, var(--bg)); }
    [data-theme="dark"] footer       { background:var(--card); }
    [data-theme="dark"] .step-card   { background:var(--card); }
    [data-theme="dark"] .stat-card   { background:var(--card); }
    [data-theme="dark"] .dish-card   { background:var(--card); }
    [data-theme="dark"] .chip        { background:var(--card); }
    [data-theme="dark"] .persona-card{ background:var(--mint); border-color:var(--border); }
    [data-theme="dark"] .email-inp   { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .search-inp  { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .social-btn  { background:var(--card); }
    [data-theme="dark"] #chat-window { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] #chat-msgs   { background:var(--bg); }
    [data-theme="dark"] .msg-bot .msg-bubble { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .chat-input-area { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .chat-inp    { background:var(--bg); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] .persona-select { background:var(--mint); border-color:var(--border); }
    [data-theme="dark"] .p-btn       { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .q-chip      { background:var(--card); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] #chat-lead-form { background:var(--card); border-color:var(--border); }
    [data-theme="dark"] .lead-inp    { background:var(--bg); border-color:var(--border); color:var(--text); }
    [data-theme="dark"] #persona-highlight { background:var(--card) !important; }
    [data-theme="dark"] .tag-cuisine { background:var(--mint); color:var(--muted); }
    [data-theme="dark"] #banner      { background:var(--green); }

    /* ═══════════════════════════════════════════
       WHATSAPP FLOATING BUTTON
    ═══════════════════════════════════════════ */
    /* ═══════════════════════════════════════════
       FAB GROUP — SAVY + WhatsApp side by side
    ═══════════════════════════════════════════ */
    /* ── COMBINED SPEED-DIAL FAB ── */
    #fab-main-wrap {
      position:fixed; bottom:22px; right:16px; z-index:999;
      display:flex; flex-direction:column; align-items:flex-end; gap:10px;
    }
    .fab-options {
      display:flex; flex-direction:column; align-items:flex-end; gap:8px;
      transition:all .3s cubic-bezier(.4,0,.2,1);
      opacity:0; pointer-events:none; transform:translateY(12px);
    }
    .fab-options.open {
      opacity:1; pointer-events:all; transform:translateY(0);
    }
    .fab-option {
      display:flex; align-items:center; gap:8px; flex-direction:row-reverse;
      cursor:pointer;
    }
    .fab-option-btn {
      width:48px; height:48px; border-radius:50%; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .2s, box-shadow .2s;
    }
    .fab-option-btn:hover { transform:scale(1.1); }
    .fab-option-lbl {
      background:var(--card); color:var(--text); font-size:11px; font-weight:700;
      padding:4px 10px; border-radius:99px; border:1px solid var(--border);
      box-shadow:var(--shadow); white-space:nowrap; font-family:'DM Sans',sans-serif;
    }
    .fab-opt-wa  { background:linear-gradient(135deg,#25D366,#128C7E); box-shadow:0 6px 24px rgba(37,211,102,0.4); }
    .fab-opt-wa:hover  { box-shadow:0 10px 32px rgba(37,211,102,0.55); }
    .fab-opt-savy { background:linear-gradient(135deg,#008060,#00a87a); box-shadow:0 6px 24px rgba(0,128,96,0.4); animation:savyPulse 2.5s ease-in-out infinite; }
    .fab-opt-savy:hover { box-shadow:0 10px 32px rgba(0,128,96,0.55); }
    #fab-savy[data-persona="employee"] { background:linear-gradient(135deg,#1E40AF,#2563eb); box-shadow:0 6px 24px rgba(30,64,175,0.4); }
    #fab-savy[data-persona="sportif"]  { background:linear-gradient(135deg,#D97706,#f59e0b); box-shadow:0 6px 24px rgba(217,119,6,0.4); }
    #fab-savy[data-persona="famille"]  { background:linear-gradient(135deg,#0D9488,#14b8a6); box-shadow:0 6px 24px rgba(13,148,136,0.4); }
    #fab-savy[data-persona="couple"]   { background:linear-gradient(135deg,#be185d,#ec4899); box-shadow:0 6px 24px rgba(190,24,93,0.4); }
    #fab-main {
      width:58px; height:58px; border-radius:50%; border:none; cursor:pointer;
      background:linear-gradient(135deg,#008060,#00a87a);
      box-shadow:0 8px 32px rgba(0,128,96,0.5);
      display:flex; align-items:center; justify-content:center;
      transition:transform .25s, box-shadow .25s;
      animation:savyPulse 2.5s ease-in-out infinite;
      position:relative;
    }
    #fab-main:hover { transform:scale(1.08); }
    #fab-main .fab-main-x {
      display:none; font-size:14px; color:#fff; font-weight:700;
    }
    #fab-main.open .fab-main-icon { display:none; }
    #fab-main.open .fab-main-x    { display:flex; }
    #fab-main.open { animation:none; background:var(--card); box-shadow:0 4px 16px rgba(0,0,0,.12); }
    #fab-main.open svg path, #fab-main.open svg circle { fill:var(--text) !important; }
    .fab-savy-badge {
      position:absolute; top:-3px; right:-3px;
      width:16px; height:16px; background:var(--pink);
      border-radius:50%; border:2px solid var(--card);
      font-size:8px; font-weight:900; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; pointer-events:none;
    }
    #fab-group { display:none; }

    .fab-item {
      display:flex; flex-direction:column; align-items:center; gap:5px;
    }
    .fab-btn {
      width:44px; height:44px; border-radius:50%;
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform .25s, box-shadow .25s;
    }
    .fab-btn:hover { transform:scale(1.1); }

    /* SAVY button — mirrors WhatsApp style */
    #fab-savy {
      background:linear-gradient(135deg,#008060,#00a87a);
      box-shadow:0 6px 24px rgba(0,128,96,0.4);
      animation:savyPulse 2.5s ease-in-out infinite;
    }
    #fab-savy[data-persona="employee"] { background:linear-gradient(135deg,#1E40AF,#2563eb); box-shadow:0 6px 24px rgba(30,64,175,0.4); }
    #fab-savy[data-persona="sportif"]  { background:linear-gradient(135deg,#D97706,#f59e0b); box-shadow:0 6px 24px rgba(217,119,6,0.4); }
    #fab-savy[data-persona="famille"]  { background:linear-gradient(135deg,#0D9488,#14b8a6); box-shadow:0 6px 24px rgba(13,148,136,0.4); }
    #fab-savy[data-persona="couple"]   { background:linear-gradient(135deg,#be185d,#ec4899); box-shadow:0 6px 24px rgba(190,24,93,0.4); }
    #fab-savy:hover { transform:scale(1.1); box-shadow:0 10px 32px rgba(0,128,96,0.55); }
    @keyframes savyPulse {
      0%,100%{box-shadow:0 4px 20px rgba(0,128,96,.4)}
      50%{box-shadow:0 4px 28px rgba(0,128,96,.65), 0 0 0 7px rgba(0,128,96,.1)}
    }

    .fab-savy-badge {
      position:absolute; top:-4px; right:-4px;
      width:17px; height:17px; background:var(--pink);
      border-radius:50%; border:2px solid #fff;
      font-size:8px; font-weight:900; color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; pointer-events:none;
    }
    .fab-item-wrap { position:relative; }

    /* WhatsApp button */
    #fab-wa {
      background:linear-gradient(135deg,#25D366,#128C7E);
      box-shadow:0 6px 24px rgba(37,211,102,0.4);
      animation:waPulse 2.5s ease-in-out infinite;
    }
    #fab-wa:hover { box-shadow:0 10px 32px rgba(37,211,102,0.55); }

    @keyframes waPulse {
      0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.4)}
      50%{box-shadow:0 4px 28px rgba(37,211,102,.65), 0 0 0 7px rgba(37,211,102,.1)}
    }

    /* Labels under each button */
    .fab-label {
      font-size:10px; font-weight:700; color:var(--sub);
      font-family:'DM Sans',sans-serif; white-space:nowrap;
      letter-spacing:.02em;
    }

    /* ── DISH DETAIL MODAL ───────────────────────────────── */
    #dish-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1001;
      display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(6px); padding:16px;
    }
    #dish-modal-overlay.open { display:flex; }
    #dish-modal {
      background:var(--card); border-radius:24px; width:min(500px,100%);
      max-height:88vh; overflow-y:auto;
      border:1px solid var(--border); box-shadow:0 32px 80px rgba(0,0,0,.22);
      animation:popIn .3s ease both; position:relative; padding:24px;
    }
    .dm-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:20px; }
    .dm-emoji  { font-size:52px; line-height:1; flex-shrink:0; }
    .dm-header-info { flex:1; min-width:0; }
    .dm-name  { font-family:'Syne',sans-serif; font-size:17px; font-weight:900; color:var(--text); line-height:1.3; }
    .dm-ar    { font-size:13px; color:var(--muted); margin-top:2px; direction:rtl; text-align:right; }
    .dm-meta  { display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
    .dm-star  { font-size:12px; color:#F59E0B; font-weight:700; }
    .dm-time  { font-size:12px; color:var(--muted); font-weight:600; }
    .dm-price-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
    .dm-price { font-family:'Syne',sans-serif; font-size:20px; font-weight:900; color:var(--green); }
    .dm-add-btn {
      padding:8px 16px; border-radius:99px; border:none; cursor:pointer;
      font-size:12px; font-weight:800; font-family:'DM Sans',sans-serif;
      background:var(--green); color:#fff; transition:all .2s;
    }
    .dm-add-btn.added { background:var(--greenXL); color:var(--green); }
    .dm-add-btn:hover { opacity:.88; }
    .dm-macros-row {
      display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:20px;
    }
    @media(max-width:480px){ .dm-macros-row { grid-template-columns:repeat(3,1fr); } }
    .dm-macro-card {
      border-radius:14px; padding:10px 6px; text-align:center;
    }
    .dm-kcal   { background:#FFF7ED; }  [data-theme="dark"] .dm-kcal   { background:rgba(249,115,22,.12); }
    .dm-prot   { background:#F0FFF4; }  [data-theme="dark"] .dm-prot   { background:rgba(0,128,96,.12); }
    .dm-carb   { background:#EFF6FF; }  [data-theme="dark"] .dm-carb   { background:rgba(59,130,246,.12); }
    .dm-fat    { background:#FFF5F5; }  [data-theme="dark"] .dm-fat    { background:rgba(239,68,68,.12); }
    .dm-fiber  { background:#F5F3FF; }  [data-theme="dark"] .dm-fiber  { background:rgba(139,92,246,.12); }
    .dm-sodium { background:#FFFBEB; }  [data-theme="dark"] .dm-sodium { background:rgba(245,158,11,.12); }
    .dm-macro-val { font-family:'Syne',sans-serif; font-size:15px; font-weight:900; color:var(--text); }
    .dm-macro-lbl { font-size:10px; color:var(--muted); font-weight:700; margin-top:2px; }
    .dm-section { margin-bottom:16px; }
    .dm-section-title { font-family:'Syne',sans-serif; font-size:13px; font-weight:800; color:var(--text); margin-bottom:8px; }
    .dm-ing-text { font-size:13px; color:var(--sub); line-height:1.8; margin:0; }
    .dm-allergens { display:flex; flex-wrap:wrap; gap:6px; }
    .dm-al-tag {
      display:inline-flex; align-items:center; gap:4px;
      background:#FFF5F5; color:#DC2626; border:1px solid #FECACA;
      border-radius:99px; padding:4px 10px; font-size:11px; font-weight:700;
    }
    [data-theme="dark"] .dm-al-tag { background:rgba(220,38,38,.12); border-color:rgba(220,38,38,.3); }
    .dm-al-clean { background:var(--greenXL); color:var(--green); border-color:var(--border); }
    .dm-tags-row { display:flex; flex-wrap:wrap; gap:6px; padding-top:12px; border-top:1px solid var(--border); }

    /* ── ORDER MODAL ── */
    #order-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:1000;
      display:none; align-items:center; justify-content:center;
      backdrop-filter:blur(6px);
    }
    #order-modal-overlay.open { display:flex; }
    #order-modal {
      background:var(--card); border-radius:24px; width:min(420px,94vw);
      padding:28px; border:1px solid var(--border);
      box-shadow:0 24px 64px rgba(0,0,0,.18);
      animation:popIn .3s ease both; position:relative;
    }

    /* ── ORDER TRACKING MODAL
    ═══════════════════════════════════════════ */
    ═══════════════════════════════════════════ */

    /* ═══════════════════════════════════════════
       LOYALTY — COMPACT STRIP (like persona icons)
    ═══════════════════════════════════════════ */
    #loyalty {
      padding: 18px clamp(16px,4vw,56px) 24px;
      background: var(--bg);
    }
    .loyalty-inner { max-width:1100px; margin:0 auto; }
    .loy-header {
      display:flex; align-items:center; gap:10px;
      margin-bottom:12px; flex-wrap:wrap;
    }
    .loy-eyebrow-pill {
      display:inline-flex; align-items:center;
      background:var(--orangeBg); border:1px solid rgba(244,163,48,.3);
      border-radius:99px; padding:4px 12px; font-size:11px; font-weight:700;
      color:var(--orange); white-space:nowrap;
    }
    .loy-heading {
      font-family:'Syne',sans-serif; font-size:15px; font-weight:800;
      color:var(--text); margin:0;
    }
    .loy-cards {
      display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
    }
    @media(max-width:600px){ .loy-cards { grid-template-columns:repeat(2,1fr); } }
    .loy-card {
      border-radius:16px; padding:14px 10px; text-align:center;
      border:2px solid transparent; transition:transform .2s; cursor:default;
    }
    .loy-card:hover { transform:translateY(-3px); }
    .loy-bronze { background:linear-gradient(135deg,#FFF8F0,#FFF0E0); border-color:#CD7F32; }
    .loy-silver { background:linear-gradient(135deg,#F5F5F5,#E8E8E8); border-color:#A8A9AD; }
    .loy-gold   { background:linear-gradient(135deg,#FFFDE7,#FFF8C4); border-color:#FFD700; }
    .loy-plat   { background:linear-gradient(135deg,#E8F5FF,#D4EEFF); border-color:#4FC3F7; }
    [data-theme="dark"] .loy-bronze { background:linear-gradient(135deg,#1A1000,#2A1800); }
    [data-theme="dark"] .loy-silver { background:linear-gradient(135deg,#0D0D0D,#1A1A1A); }
    [data-theme="dark"] .loy-gold   { background:linear-gradient(135deg,#1A1500,#2A2200); }
    [data-theme="dark"] .loy-plat   { background:linear-gradient(135deg,#001020,#001A30); }
    .loy-badge    { font-size:22px; display:block; margin-bottom:4px; }
    .loy-card-name{ font-weight:800; font-size:13px; color:var(--text); }
    .loy-card-ord { font-size:10px; color:var(--muted); margin-top:2px; }
    .loy-card-pts { font-size:11px; font-weight:700; color:var(--green); margin-top:4px; }

    /* ═══════════════════════════════════════════
       NUTRITIONAL CALCULATOR SECTION
    ═══════════════════════════════════════════ */
    #nutri-calc {
      padding:72px clamp(16px,4vw,56px);
      background:var(--card);
    }
    /* ── ORDER TRACKING SECTION ──────────────────────────── */
    #order-track-section {
      padding:20px clamp(16px,4vw,56px) 24px;
      background:var(--bg); border-top:1px solid var(--border);
    }
    .ots-inner { max-width:1100px; margin:0 auto; }
    .ots-header {
      display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;
    }
    .ots-order-id {
      font-family:'Syne',sans-serif; color:var(--green); font-size:15px;
    }
    .ots-body {
      display:grid; grid-template-columns:1fr auto; gap:20px; align-items:center;
    }
    @media(max-width:600px){ .ots-body { grid-template-columns:1fr; } }
    .ots-steps { display:flex; flex-direction:column; gap:0; }
    .ots-step {
      display:flex; align-items:center; gap:12px; padding:8px 0 8px 14px;
      border-left:2px solid var(--border); margin-left:10px; position:relative;
    }
    .ots-step:last-child { border-left-color:transparent; }
    .ots-dot {
      position:absolute; left:-10px;
      width:20px; height:20px; border-radius:50%;
      background:var(--card); border:2px solid var(--border);
      display:flex; align-items:center; justify-content:center;
      font-size:9px; flex-shrink:0;
    }
    .ots-done .ots-dot  { background:var(--green); border-color:var(--green); color:#fff; font-size:10px; }
    .ots-active .ots-dot { background:var(--green); border-color:var(--green); font-size:13px; animation:pulse 1.3s infinite; }
    .ots-done   { border-left-color:var(--green); }
    .ots-active { border-left-color:var(--greenL); }
    .ots-step-content { display:flex; align-items:baseline; gap:8px; }
    .ots-step-title { font-size:12px; font-weight:700; color:var(--text); }
    .ots-active .ots-step-title { color:var(--green); }
    .ots-step:not(.ots-done):not(.ots-active) .ots-step-title { color:var(--muted); }
    .ots-step-time { font-size:10px; color:var(--muted); }
    .ots-eta-card {
      background:linear-gradient(135deg,var(--green),var(--greenL));
      border-radius:18px; padding:18px 22px; color:#fff; text-align:center;
      min-width:130px;
    }
    .ots-eta-num { font-family:'Syne',sans-serif; font-size:40px; font-weight:900; line-height:1; }
    .ots-eta-lbl { font-size:11px; opacity:.85; margin-top:2px; margin-bottom:10px; }
    .ots-progress {
      background:rgba(255,255,255,.25); border-radius:99px; height:5px; margin-bottom:12px; overflow:hidden;
    }
    .ots-progress-fill {
      height:100%; background:#fff; border-radius:99px;
      transition:width 1.2s cubic-bezier(.4,0,.2,1);
    }
    .ots-cta-txt { font-size:10px; opacity:.8; margin-bottom:6px; }
    .ots-cta-btn {
      background:#fff; color:var(--green);
