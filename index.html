<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SAVY – Manger intelligent, livré chez vous | الأكل الذكي</title>
  <meta name="description" content="SAVY – La première livraison de repas sains propulsée par l'IA au Maroc. Tétouan, M'diq, Martil — Bientôt."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #EEF7F3;
      --card:     #FFFFFF;
      --mint:     #DFF0E9;
      --green:    #008060;
      --greenL:   #00A878;
      --greenXL:  #E6F5EF;
      --text:     #0D1F18;
      --sub:      #4A7A66;
      --muted:    #8FBFAA;
      --border:   #D1E5DE;
      --shadow:   0 10px 30px -5px rgba(0,128,96,0.1);
      --radius:   24px;
      --radius-s: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }
    [dir="rtl"] { font-family: 'Tajawal', sans-serif; }

    /* --- NAVIGATION --- */
    #navbar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(238,247,243,0.85);
      backdrop-filter: blur(12px);
      height: 72px; padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 28px; color: var(--green); letter-spacing: -1px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { text-decoration: none; color: var(--sub); font-weight: 600; font-size: 14px; transition: 0.2s; }
    .nav-links a:hover { color: var(--green); }
    .lang-btn {
      background: var(--card); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 50px; cursor: pointer;
      font-family: inherit; font-weight: 700; font-size: 13px; color: var(--green);
      transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .lang-btn:hover { background: var(--greenXL); transform: translateY(-1px); }

    /* --- HERO --- */
    #hero { padding: 80px 5% 60px; }
    .hero-inner {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; align-items: center;
    }
    .hero-tag {
      display: inline-block; background: var(--mint); color: var(--green);
      padding: 6px 14px; border-radius: 50px; font-weight: 800; font-size: 12px;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px;
    }
    h1.hero-title {
      font-family: 'Syne', sans-serif; font-size: clamp(42px, 6vw, 72px);
      line-height: 0.95; font-weight: 900; color: var(--text); margin-bottom: 24px;
    }
    .hero-sub {
      font-size: 18px; color: var(--sub); max-width: 500px; margin-bottom: 32px;
    }

    /* --- HERO FORM --- */
    .email-wrap {
      display: flex; background: var(--card); padding: 8px;
      border-radius: 20px; border: 1px solid var(--border);
      box-shadow: var(--shadow); max-width: 550px;
    }
    .email-inp {
      flex: 1; border: none; padding: 0 20px; outline: none;
      font-size: 16px; font-family: inherit; color: var(--text); background: transparent;
    }
    .btn-cta {
      background: var(--green); color: #fff; border: none;
      padding: 16px 32px; border-radius: 14px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s;
    }
    .btn-cta:hover { background: var(--greenL); transform: scale(1.02); }

    /* --- ROBOT ANIMATION --- */
    .hero-right { display: flex; justify-content: center; }
    .robot-float {
      animation: float 4s ease-in-out infinite; filter: drop-shadow(0 20px 40px rgba(0,128,96,0.15));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-20px) rotate(2deg); }
    }

    /* --- MENU SECTION --- */
    #menu { padding: 80px 5%; background: #fff; border-radius: 60px 60px 0 0; }
    .section-head { text-align: center; margin-bottom: 40px; }
    .filter-row {
      display: flex; gap: 12px; margin-bottom: 30px; justify-content: center;
      overflow-x: auto; padding: 10px 5px; scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .f-pill {
      background: var(--bg); border: 1px solid var(--border); padding: 10px 20px;
      border-radius: 50px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s;
    }
    .f-pill.active { background: var(--green); color: #fff; border-color: var(--green); }

    .menu-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px; max-width: 1200px; margin: 0 auto;
    }
    .dish-card {
      background: var(--bg); border-radius: var(--radius); padding: 20px;
      display: flex; align-items: center; gap: 20px; transition: 0.3s; border: 1px solid transparent;
    }
    .dish-card:hover { transform: translateY(-5px); border-color: var(--greenL); background: #fff; box-shadow: var(--shadow); }
    .dish-emoji { font-size: 40px; background: #fff; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 20px; }
    .dish-info { flex: 1; }
    .dish-name { font-weight: 800; font-size: 18px; margin-bottom: 4px; }
    .dish-desc { font-size: 13px; color: var(--sub); margin-bottom: 12px; }
    .add-btn {
      background: var(--green); color: #fff; border: none; width: 36px; height: 36px;
      border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; transition: 0.3s;
    }
    .add-btn:hover { transform: rotate(90deg); background: var(--text); }

    /* --- AGENT AI --- */
    .agent-box {
      background: var(--text); color: #fff; border-radius: 30px; padding: 24px;
      margin-top: 40px; position: relative; overflow: hidden;
    }
    #inline-msgs { height: 150px; overflow-y: auto; margin-bottom: 15px; font-size: 14px; }
    .bot-m { color: var(--muted); margin-bottom: 12px; }
    .agent-input-wrap { display: flex; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 5px; }
    .agent-input-wrap input { flex: 1; background: transparent; border: none; padding: 10px; color: #fff; outline: none; }

    /* --- MOBILE STYLES (THE FIX) --- */
    @media (max-width: 768px) {
      #navbar { height: 64px; }
      .nav-links { display: none; }
      
      #hero { padding: 40px 20px; }
      .hero-inner { grid-template-columns: 1fr; text-align: center; }
      .hero-right { order: -1; margin-bottom: 20px; }
      .robot-float svg { width: 140px; height: 140px; }
      
      h1.hero-title { font-size: 42px; margin-bottom: 16px; }
      .hero-sub { margin: 0 auto 24px; font-size: 16px; }
      
      .email-wrap { flex-direction: column; background: transparent; border: none; box-shadow: none; padding: 0; }
      .email-inp { 
        background: #fff; border: 1px solid var(--border); 
        height: 56px; border-radius: 16px; margin-bottom: 10px; 
        text-align: center;
      }
      .btn-cta { width: 100%; height: 56px; justify-content: center; }
      
      .filter-row { 
        justify-content: flex-start; 
        margin-left: -20px; margin-right: -20px; 
        padding: 10px 20px;
        scroll-snap-type: x mandatory;
      }
      .f-pill { scroll-snap-align: start; }
      
      .menu-grid { grid-template-columns: 1fr; }
      .dish-card { 
        flex-direction: column; text-align: center; padding: 30px 20px; 
      }
      .dish-emoji { width: 100px; height: 100px; font-size: 50px; margin: 0 auto 10px; }
      .add-btn { width: 100%; height: 50px; margin-top: 15px; }
    }

    /* RTL Specifics */
    [dir="rtl"] .btn-cta i { transform: scaleX(-1); }
    [dir="rtl"] .email-inp { text-align: right; }
    @media (max-width: 768px) { [dir="rtl"] .email-inp { text-align: center; } }
  </style>
</head>
<body id="body">

  <nav id="navbar">
    <div class="logo">SAVY</div>
    <div class="nav-links">
      <a href="#menu" data-t="menu">Menu</a>
      <a href="#about" data-t="concept">Concept</a>
    </div>
    <button class="lang-btn" onclick="toggleLang()" id="lang-toggle">العربية 🇲🇦</button>
  </nav>

  <section id="hero">
    <div class="hero-inner">
