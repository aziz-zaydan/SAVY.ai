<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>SAVY – Manger intelligent | الأكل الذكي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=DM+Sans:wght@400;500;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #EEF7F3; --card: #FFFFFF; --green: #008060; --text: #0D1F18;
      --sub: #4A7A66; --border: #D1E5DE; --shadow: 0 10px 30px rgba(0,128,96,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    [dir="rtl"] { font-family: 'Tajawal', sans-serif; }

    /* Header */
    #navbar { 
      height: 70px; padding: 0 5%; display: flex; align-items: center; justify-content: space-between;
      background: rgba(238,247,243,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 900; font-size: 26px; color: var(--green); }
    .lang-btn { background: #fff; border: 1px solid var(--border); padding: 8px 16px; border-radius: 50px; cursor: pointer; font-weight: 700; }

    /* Hero Section */
    #hero { padding: 40px 5%; text-align: center; }
    h1 { font-family: 'Syne', sans-serif; font-size: clamp(32px, 8vw, 60px); line-height: 1; margin-bottom: 20px; }
    .hero-sub { color: var(--sub); margin-bottom: 30px; font-size: 18px; }
    
    .email-wrap { 
      max-width: 500px; margin: 0 auto 40px; display: flex; flex-direction: column; gap: 10px; 
    }
    input { padding: 16px; border-radius: 15px; border: 1px solid var(--border); font-size: 16px; outline: none; }
    .btn-cta { background: var(--green); color: #fff; padding: 16px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; }

    /* AI Chat Agent Box */
    .agent-container {
      max-width: 600px; margin: 20px auto; background: #0D1F18; border-radius: 25px; padding: 20px; color: #fff;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .agent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #2A3F36; padding-bottom: 10px; }
    .status-dot { width: 10px; height: 10px; background: #00ff88; border-radius: 50%; animation: pulse 2s infinite; }
    #inline-msgs { height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; padding-right: 5px; }
    .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.4; }
    .bot { background: #1A2F26; align-self: flex-start; border-bottom-left-radius: 2px; }
    .user { background: var(--green); align-self: flex-end; border-bottom-right-radius: 2px; }
    
    .input-area { display: flex; background: #1A2F26; border-radius: 15px; padding: 5px; }
