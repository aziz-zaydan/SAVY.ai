# ══════════════════════════════════════════════════════════════
#  SAVY — netlify.toml
# ══════════════════════════════════════════════════════════════

[build]
  publish   = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions]
  node_bundler = "esbuild"

# ── REDIRECTS ─────────────────────────────────────────────────
# No catch-all redirect — all .html files are served as static files
# savy-menu.html and dashboard.html load normally as direct paths

# ── GLOBAL SECURITY HEADERS ───────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # Allow same-origin iframes (needed for savy-menu.html inside index.html)
    X-Frame-Options              = "SAMEORIGIN"
    X-Content-Type-Options       = "nosniff"
    X-XSS-Protection             = "1; mode=block"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "geolocation=(), microphone=(), camera=()"
    # HTTPS only — 1 year
    Strict-Transport-Security    = "max-age=31536000; includeSubDomains; preload"

# ── HTML FILES — no cache (always fresh) ─────────────────────

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── IMAGES — long cache (content-addressed by filename) ───────

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── FONTS & ICONS ─────────────────────────────────────────────

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── JS / CSS ASSETS ───────────────────────────────────────────

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── SERVICE WORKERS (must never be cached) ────────────────────

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control         = "no-cache, no-store, must-revalidate"
    Content-Type          = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/sw-dashboard.js"
  [headers.values]
    Cache-Control         = "no-cache, no-store, must-revalidate"
    Content-Type          = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

# ── MANIFESTS ────────────────────────────────────────────────

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json; charset=utf-8"

[[headers]]
  for = "/dashboard-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json; charset=utf-8"

# ── NETLIFY FUNCTIONS — never cache ──────────────────────────

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Cache-Control                = "no-store, no-cache"
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[headers]]
  for = "/netlify/functions/whatsapp"
  [headers.values]
    Cache-Control = "no-store"
