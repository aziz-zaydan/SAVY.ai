let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  const html = document.documentElement;
  html.lang = lang;
  html.dir  = lang === 'ar' ? 'rtl' : 'ltr';

  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang === 'ar' ? 'ع' : 'EN'));
  });

  const t = T[lang];

  // Nav
  setText('nav-city', t.nav_city);

  // Hero
  setHTML('hero-title-el', t.hero_title);
  setText('hero-eyebrow-el', t.hero_eyebrow);
  setText('hero-sub-el', t.hero_sub);
  setText('hero-b1', t.hero_b1);
  setText('hero-b2', t.hero_b2);
  setText('hero-b3', t.hero_b3);

  // Motivational banner
  setText('moto-title-el', t.moto_title);
  setText('moto-sub-el', t.moto_sub);

  // Section headers
  setText('sec-muscle-title', t.sec_muscle);
  setText('sec-muscle-desc', t.sec_muscle_d);
  setText('sec-lean-title', t.sec_lean);
  setText('sec-lean-desc', t.sec_lean_d);
  setText('sec-fast-title', t.sec_fast);
  setText('sec-fast-desc', t.sec_fast_d);
  setText('sec-sweet-title', t.sec_sweet);
  setText('sec-sweet-desc', t.sec_sweet_d);

  // Section nav pills
  document.querySelectorAll('.snav-pill').forEach((p, i) => {
    if (t.snav[i]) p.textContent = t.snav[i];
  });

  // Meal cards
  Object.entries(t.meals).forEach(([id, meal]) => {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (!card) return;
    const nameEl = card.querySelector('.meal-name');
    const descEl = card.querySelector('.meal-desc');
    if (nameEl) nameEl.textContent = meal.name;
    if (descEl) descEl.textContent = meal.desc;
    card.dataset.name = meal.name;
  });

  // Tags
  document.querySelectorAll('.meal-tag').forEach(tag => {
    const key = tag.dataset.tagkey;
    if (key && t.tags[key]) tag.textContent = t.tags[key];
  });

  // Subscription section
  setText('sub-eyebrow-el', t.sub_eyebrow);
  setText('sub-title-el', t.sub_title);
  setText('sub-sub-el', t.sub_sub);
  // Plans
  ['1','2','3'].forEach(n => {
    setText(`plan${n}-name`, t[`plan${n}_name`]);
    setText(`plan${n}-freq`, t[`plan${n}_freq`]);
    setText(`plan${n}-price`, t[`plan${n}_price`]);
    for (let f = 1; f <= 5; f++) {
      setText(`plan${n}-f${f}`, t[`plan${n}_f${f}`] || '');
    }
  });
  document.querySelectorAll('.sub-cta').forEach(b => b.textContent = t.sub_cta);
  document.querySelectorAll('.best-value-label').forEach(el => el.textContent = t.best_value);

  // Cart
  setText('cart-title-el', t.cart_title);
  setText('cart-clear-el', t.cart_clear);
  setText('combo-label-el', t.combo_label);
  setText('combo-name-el', t.combo_name);
  setText('combo-add-el', t.combo_add);
  setText('footer-tag-el', t.footer_tag);

  // Re-render cart items with new names
  updateCartUI();
}

function setText(id, val) { const el = document.getElementById(id); if (el && val !== undefined) el.textContent = val; }
function setHTML(id, val) { const el = document.getElementById(id); if (el && val !== undefined) el.innerHTML = val; }

// ══════════════════════════════════════
//  CART
// ══════════════════════════════════════
let cart = {};
let cartExpanded = false;

function toggleItem(e, id, name, price, emoji, section) {
  e.stopPropagation();
  if (cart[id]) {
    delete cart[id];
  } else {
    const t = T[currentLang];
    const mealName = t.meals[id] ? t.meals[id].name : name;
    cart[id] = { name: mealName, price, emoji, section, qty: 1 };
  }
  updateCartUI();
  updateCardUI(id);
}

function addCombo() {
  const t = T[currentLang];
  cart['s4'] = { name: t.meals.s4.name, price:35, emoji:'🥤', section:'sweet', qty:1 };
  updateCartUI();
  updateCardUI('s4');
  document.getElementById('combo-banner').style.display = 'none';
}

function removeItem(id) {
  delete cart[id];
  updateCartUI();
  updateCardUI(id);
}

function clearCart() {
  cart = {};
  updateCartUI();
  document.querySelectorAll('.meal-add-btn').forEach(btn => {
    btn.textContent = '+';
    btn.className = 'meal-add-btn idle';
  });
}

function checkout() {
  if (!Object.keys(cart).length) return;
  const t = T[currentLang];
  alert(currentLang === 'ar'
    ? '🧬 جاري التوجه لتأكيد الطلب...'
    : '🧬 Redirecting to order confirmation...');
}

function updateCardUI(id) {
  const btn = document.querySelector(`[data-id="${id}"] .meal-add-btn`);
  if (!btn) return;
  const section = document.querySelector(`[data-id="${id}"]`)?.dataset.section || 'muscle';
  if (cart[id]) { btn.textContent = '✓'; btn.className = `meal-add-btn ${section}-added`; }
  else           { btn.textContent = '+'; btn.className = 'meal-add-btn idle'; }
}

function updateCartUI() {
  const t = T[currentLang];
  const items = Object.entries(cart);
  const count = items.length;
  const total = items.reduce((s,[,v]) => s + v.price * v.qty, 0);

  document.getElementById('nav-cart-count').textContent =
    count === 0 ? (currentLang==='ar'?'0 عناصر':'0 items') : `${count} ${currentLang==='ar'?'عناصر':'item'}${count>1&&currentLang==='en'?'s':''}`;

  document.getElementById('cart-handle-count').textContent = count;
  document.getElementById('cart-handle-total').textContent = total + ' MAD';
  const tb = document.getElementById('cart-total-btn');
  if (tb) tb.textContent = total + ' MAD';

  const stickyCart = document.getElementById('sticky-cart');
  if (count > 0) stickyCart.classList.add('open');
  else { stickyCart.classList.remove('open'); cartExpanded=false; document.getElementById('cart-expanded').classList.remove('open'); }

  const listEl = document.getElementById('cart-items-list');
  listEl.innerHTML = items.length === 0
    ? `<div class="empty-cart">${t.cart_empty}</div>`
    : items.map(([id, item]) => `
        <div class="cart-item">
          <div class="cart-item-img">${item.emoji}</div>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${item.price} MAD</div>
          </div>
          <button class="cart-item-remove" onclick="removeItem('${id}')">✕</button>
        </div>`).join('');

  const cb = document.getElementById('combo-banner');
  if (count > 0 && !cart['s4']) cb.style.display='flex'; else cb.style.display='none';
}

function toggleCart() { if (Object.keys(cart).length) toggleCartExpand(); }
function toggleCartExpand() {
  cartExpanded = !cartExpanded;
  const exp = document.getElementById('cart-expanded');
  if (cartExpanded) exp.classList.add('open'); else exp.classList.remove('open');
}

// ── Section nav scroll spy ──────────────────────────────────
const sections = ['muscle','lean','fast','sweet','plans'];
const pills = document.querySelectorAll('.snav-pill');
const colorMap = { muscle:'active-muscle',lean:'active-lean',fast:'active-fast',sweet:'active-sweet',plans:'active-muscle' };

function scrollTo(id) { document.getElementById(id)?.scrollIntoView({behavior:'smooth',block:'start'}); }

const obs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const id = entry.target.id;
      pills.forEach(p => p.classList.remove('active-muscle','active-lean','active-fast','active-sweet'));
      const idx = sections.indexOf(id);
      if (idx >= 0 && pills[idx]) pills[idx].classList.add(colorMap[id]||'active-muscle');
    }
  });
}, { threshold:0.25 });
sections.forEach(id => { const el=document.getElementById(id); if(el) obs.observe(el); });

// ── Card animations ─────────────────────────────────────────
document.querySelectorAll('.meal-card').forEach((card,i) => { card.style.animationDelay=`${i*.06}s`; });

// ── Sub plan CTAs ────────────────────────────────────────────
document.querySelectorAll('.sub-cta').forEach(btn => {
  btn.addEventListener('click', () => {
    alert(currentLang==='ar'
      ? '🚀 خطط الاشتراك قادمة قريباً!'
      : '🚀 Subscription plans launching soon!');
  });
});
</script>
