<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAVY — Premium Meal Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0C0F0C;
  --surface:  #141914;
  --card:     #1A201A;
  --border:   rgba(255,255,255,0.07);
  --text:     #F0F7F0;
  --muted:    #6B8B6B;
  --faint:    #2A332A;

  /* Section accent colors */
  --muscle:   #00E676;
  --muscle-d: #00C060;
  --lean:     #FF6B9D;
  --lean-d:   #E0527E;
  --fast:     #FF9F43;
  --fast-d:   #E07A1A;
  --sweet:    #C77DFF;
  --sweet-d:  #9B4FD6;

  --radius:   20px;
  --font:     'Outfit', sans-serif;
  --body:     'DM Sans', sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--body);
  min-height:100vh;
  overflow-x:hidden;
}


/* ── RTL / ARABIC ── */
[lang="ar"] { direction: rtl; }
[lang="ar"] body { font-family: 'Tajawal', sans-serif; }
[lang="ar"] .nav-logo,
[lang="ar"] .section-title,
[lang="ar"] .sub-plan-name,
[lang="ar"] .hero-title,
[lang="ar"] .sub-title,
[lang="ar"] .meal-name,
[lang="ar"] .cart-item-name { font-family: 'Tajawal', sans-serif; font-weight: 800; }
[lang="ar"] .meal-tag { left: auto; right: 8px; }
[lang="ar"] .meal-add-btn { right: auto; left: 8px; }
[lang="ar"] .combo-banner { direction: rtl; }
[lang="ar"] .sub-plan::before { right: auto; left: 14px; }

/* ── LANG TOGGLE ── */
.lang-toggle {
  display: flex; gap: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px; padding: 3px;
  border: 1px solid var(--border);
}
.lang-btn {
  padding: 4px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 700;
  border: none; cursor: pointer;
  font-family: var(--font);
  color: var(--muted); background: transparent;
  transition: all .18s;
}
.lang-btn.active {
  background: var(--muscle);
  color: #032b14;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--faint);border-radius:2px;}

/* ── NAV ── */
nav {
  position:sticky;top:0;z-index:100;
  background:rgba(12,15,12,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo {
  font-family:var(--font);font-weight:900;font-size:22px;
  color:var(--muscle);letter-spacing:-1px;
}
.nav-logo span{color:var(--text);font-weight:300;}
.nav-city {
  font-size:11px;color:var(--muted);font-weight:500;
  display:flex;align-items:center;gap:5px;
}
.nav-city::before{content:'📍';}
.nav-cart-mini {
  background:var(--muscle);color:#0C0F0C;
  border:none;border-radius:99px;
  padding:7px 14px;font-size:12px;font-weight:800;
  cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;gap:6px;
  transition:all .18s;
}
.nav-cart-mini:hover{background:var(--muscle-d);}
#cart-count-badge {
  background:#0C0F0C;color:var(--muscle);
  width:18px;height:18px;border-radius:50%;
  font-size:10px;font-weight:900;
  display:none;align-items:center;justify-content:center;
}
#cart-count-badge.show{display:flex;}

/* ── SECTION NAV PILLS ── */
.section-nav {
  position:sticky;top:57px;z-index:99;
  background:rgba(12,15,12,0.95);
  backdrop-filter:blur(20px);
  padding:0 20px;
  border-bottom:1px solid var(--border);
  display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;
}
.section-nav::-webkit-scrollbar{display:none;}
.snav-pill {
  padding:12px 16px;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  white-space:nowrap;font-family:var(--font);
  transition:all .2s;flex-shrink:0;
}
.snav-pill:hover{color:var(--text);}
.snav-pill.active-muscle{color:var(--muscle);border-color:var(--muscle);}
.snav-pill.active-lean{color:var(--lean);border-color:var(--lean);}
.snav-pill.active-fast{color:var(--fast);border-color:var(--fast);}
.snav-pill.active-sweet{color:var(--sweet);border-color:var(--sweet);}

/* ── HERO BAND ── */
.hero-band {
  padding:40px 20px 32px;
  text-align:center;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,230,118,0.12) 0%, transparent 70%);
}
.hero-eyebrow {
  font-size:10px;font-weight:800;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muscle);
  margin-bottom:10px;
  display:inline-flex;align-items:center;gap:8px;
}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:24px;height:1px;background:var(--muscle);opacity:.5;}
.hero-title {
  font-family:var(--font);font-weight:900;
  font-size:clamp(28px,7vw,48px);
  line-height:1.05;letter-spacing:-1.5px;
  color:var(--text);margin-bottom:12px;
}
.hero-title span{color:var(--muscle);}
.hero-sub {
  font-size:14px;color:var(--muted);line-height:1.7;
  max-width:340px;margin:0 auto 20px;
}
.hero-badges {
  display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
}
.hero-badge {
  padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;
  border:1px solid rgba(0,230,118,0.25);color:var(--muscle);
  background:rgba(0,230,118,0.06);
}

/* ── SECTION ── */
.menu-section { padding:32px 16px 24px; }
.section-header {
  display:flex;align-items:center;gap:12px;
  margin-bottom:6px;
}
.section-icon {
  width:42px;height:42px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  flex-shrink:0;
}
.section-title {
  font-family:var(--font);font-weight:900;font-size:20px;
  letter-spacing:-.5px;color:var(--text);
}
.section-desc {
  font-size:12px;color:var(--muted);margin-top:2px;
}
.section-divider {
  height:1px;background:var(--border);margin:16px 0 20px;
}

/* Muscle section */
#muscle .section-icon{background:rgba(0,230,118,0.12);}
#muscle .section-title{color:var(--muscle);}
/* Lean section */
#lean .section-icon{background:rgba(255,107,157,0.12);}
#lean .section-title{color:var(--lean);}
/* Fast section */
#fast .section-icon{background:rgba(255,159,67,0.12);}
#fast .section-title{color:var(--fast);}
/* Sweet section */
#sweet .section-icon{background:rgba(199,125,255,0.12);}
#sweet .section-title{color:var(--sweet);}

/* ── MEAL GRID ── */
.meal-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* ── MEAL CARD ── */
.meal-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,border-color .2s;
  animation:cardIn .4s ease both;
  cursor:pointer;
  position:relative;
}
.meal-card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(0,0,0,0.4);
}
.meal-card:active{transform:scale(.97);}
@keyframes cardIn{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* Image area */
.meal-img {
  width:100%;aspect-ratio:1/1;
  position:relative;overflow:hidden;
  background:var(--faint);
  flex-shrink:0;
}
.meal-img img{
  width:100%;height:100%;object-fit:cover;
  display:block;opacity:0;transition:opacity .5s;
}
.meal-img img.loaded{opacity:1;}
.meal-img-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
}
.meal-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,rgba(0,0,0,.1) 50%,transparent 100%);
  pointer-events:none;
}
.meal-tag{
  position:absolute;top:8px;left:8px;
  font-size:8.5px;font-weight:800;
  padding:3px 9px;border-radius:99px;
  font-family:var(--font);letter-spacing:.04em;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
}
.tag-muscle{background:rgba(0,230,118,.85);color:#032b14;}
.tag-lean{background:rgba(255,107,157,.85);color:#4a0020;}
.tag-fast{background:rgba(255,159,67,.85);color:#3d1f00;}
.tag-sweet{background:rgba(199,125,255,.85);color:#1a003d;}
.tag-bestseller{background:rgba(255,200,0,.9);color:#3d2800;}
.tag-new{background:rgba(0,200,255,.85);color:#001a2d;}

.meal-add-btn{
  position:absolute;bottom:8px;right:8px;
  width:32px;height:32px;border-radius:50%;
  border:none;cursor:pointer;
  font-size:20px;font-weight:900;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
.meal-add-btn.idle{
  background:rgba(255,255,255,.9);
  color:#0C0F0C;
}
.meal-add-btn.added{
  background:var(--muscle);
  color:#0C0F0C;
  transform:scale(1.1);
}
.meal-add-btn.lean-added{background:var(--lean);color:#fff;}
.meal-add-btn.fast-added{background:var(--fast);color:#fff;}
.meal-add-btn.sweet-added{background:var(--sweet);color:#fff;}
.meal-add-btn:active{transform:scale(.92);}

/* Card body */
.meal-body{padding:10px 11px 12px;flex:1;display:flex;flex-direction:column;gap:4px;}
.meal-name{
  font-family:var(--font);font-weight:800;
  font-size:13px;line-height:1.25;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.meal-desc{
  font-size:10.5px;color:var(--muted);line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.meal-macros{
  display:flex;align-items:center;gap:6px;
  margin-top:4px;
}
.macro-pill{
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;
  font-family:var(--font);
}
.mp-cal{background:rgba(255,255,255,.07);color:var(--muted);}
.mp-prot{background:rgba(0,230,118,.12);color:var(--muscle);}
.meal-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:6px;
}
.meal-price{
  font-family:var(--font);font-weight:900;font-size:15px;
  color:var(--text);letter-spacing:-.3px;
}
.meal-price span{font-size:10px;font-weight:500;color:var(--muted);}

/* ── WIDE CARD (featured, spans 2 cols) ── */
.meal-card.wide{
  grid-column:span 2;
  flex-direction:row;
}
.meal-card.wide .meal-img{
  width:45%;aspect-ratio:unset;flex-shrink:0;
}
.meal-card.wide .meal-body{padding:14px;}
.meal-card.wide .meal-name{font-size:15px;-webkit-line-clamp:3;}
.meal-card.wide .meal-desc{-webkit-line-clamp:3;font-size:11px;}

/* ── SUBSCRIPTION SECTION ── */
.sub-section{
  padding:36px 16px 40px;
  background:radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,230,118,0.07) 0%, transparent 70%);
  border-top:1px solid var(--border);
}
.sub-header{text-align:center;margin-bottom:28px;}
.sub-eyebrow{
  font-size:10px;font-weight:800;letter-spacing:.18em;
  color:var(--muscle);text-transform:uppercase;
  margin-bottom:8px;display:block;
}
.sub-title{
  font-family:var(--font);font-weight:900;font-size:clamp(22px,6vw,34px);
  letter-spacing:-1px;color:var(--text);margin-bottom:8px;
}
.sub-subtitle{font-size:13px;color:var(--muted);}

.sub-plans{
  display:flex;flex-direction:column;gap:12px;
}
.sub-plan{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  position:relative;overflow:hidden;
  transition:all .2s;
}
.sub-plan:hover{border-color:rgba(0,230,118,.3);}
.sub-plan.featured{
  background:linear-gradient(135deg,#0D2018,#0F2A1A);
  border:1.5px solid var(--muscle);
  box-shadow:0 0 0 4px rgba(0,230,118,.06),0 16px 48px rgba(0,0,0,.3);
}
/* placeholder-keep */{
  content:'BEST VALUE'; /* translatable via .best-value-label */
  position:absolute;top:14px;right:14px;
  font-size:8px;font-weight:900;letter-spacing:.1em;
  padding:3px 8px;border-radius:99px;
  background:var(--muscle);color:#032b14;
  font-family:var(--font);
}
.sub-plan-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sub-plan-name{font-family:var(--font);font-weight:900;font-size:16px;color:var(--text);}
.sub-plan-name span{font-size:11px;font-weight:500;color:var(--muted);margin-left:4px;}
.sub-price{
  font-family:var(--font);font-weight:900;font-size:22px;letter-spacing:-1px;
}
.sub-price span{font-size:11px;font-weight:400;color:var(--muted);}
.sub-features{
  display:flex;flex-direction:column;gap:5px;margin-bottom:14px;
}
.sub-feat{
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.sub-feat::before{content:'✓';color:var(--muscle);font-weight:900;}
.sub-cta{
  width:100%;padding:12px;border-radius:12px;
  font-family:var(--font);font-size:13px;font-weight:800;
  cursor:pointer;transition:all .18s;border:none;
}
.sub-cta.outline{
  background:transparent;color:var(--text);
  border:1.5px solid var(--border);
}
.sub-cta.outline:hover{border-color:var(--muscle);color:var(--muscle);}
.sub-cta.filled{
  background:linear-gradient(135deg,var(--muscle),var(--muscle-d));
  color:#032b14;
  box-shadow:0 6px 24px rgba(0,230,118,.3);
}
.sub-cta.filled:hover{box-shadow:0 8px 32px rgba(0,230,118,.45);}

/* ── STICKY CART ── */
#sticky-cart{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.22,1,.36,1);
}
#sticky-cart.open{transform:translateY(0);}
.cart-handle{
  background:var(--muscle);
  color:#032b14;
  padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;
  border-radius:20px 20px 0 0;
}
.cart-handle-left{
  font-family:var(--font);font-weight:800;font-size:14px;
  display:flex;align-items:center;gap:10px;
}
.cart-handle-count{
  background:#032b14;color:var(--muscle);
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;
}
.cart-handle-total{
  font-family:var(--font);font-weight:900;font-size:16px;
}
.cart-expanded{
  background:var(--surface);
  border-top:1px solid var(--border);
  max-height:60dvh;overflow-y:auto;
  display:none;
}
.cart-expanded.open{display:block;}
.cart-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--border);
}
.cart-item-img{
  width:48px;height:48px;border-radius:12px;
  background:var(--faint);overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-family:var(--font);font-weight:700;font-size:13px;color:var(--text);}
.cart-item-price{font-size:12px;color:var(--muted);margin-top:2px;}
.cart-item-remove{
  background:rgba(255,80,80,.1);border:none;
  color:#FF5050;width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;flex-shrink:0;
  transition:background .15s;
}
.cart-item-remove:hover{background:rgba(255,80,80,.2);}
.cart-footer{
  padding:14px 16px;
  display:flex;gap:10px;align-items:center;
}
.cart-checkout-btn{
  flex:1;padding:14px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--muscle),var(--muscle-d));
  color:#032b14;font-family:var(--font);font-size:14px;font-weight:800;
  cursor:pointer;box-shadow:0 6px 20px rgba(0,230,118,.3);
  transition:all .18s;
}
.cart-checkout-btn:hover{box-shadow:0 8px 28px rgba(0,230,118,.45);}
.cart-clear-btn{
  padding:14px 16px;border-radius:14px;
  background:var(--faint);color:var(--muted);
  border:none;cursor:pointer;font-size:12px;font-weight:700;
  transition:all .15s;
}
.cart-clear-btn:hover{color:var(--text);}

/* Combo suggestion */
.combo-banner{
  margin:16px;padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(199,125,255,.25);
  background:rgba(199,125,255,.06);
  display:flex;align-items:center;gap:10px;
}
.combo-text{flex:1;}
.combo-label{font-size:10px;font-weight:800;color:var(--sweet);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.combo-name{font-size:13px;font-weight:700;color:var(--text);}
.combo-add{
  background:var(--sweet);color:#fff;
  border:none;border-radius:8px;padding:7px 12px;
  font-size:11px;font-weight:800;cursor:pointer;
  font-family:var(--font);flex-shrink:0;
}

/* ── MOTIVATIONAL BANNER ── */
.moto-banner{
  margin:0 16px 24px;padding:16px;
  border-radius:16px;
  background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,230,118,.03));
  border:1px solid rgba(0,230,118,.15);
  display:flex;align-items:center;gap:12px;
}
.moto-icon{font-size:28px;}
.moto-title{font-family:var(--font);font-weight:800;font-size:14px;color:var(--text);margin-bottom:2px;}
.moto-sub{font-size:11.5px;color:var(--muted);}

/* ── ANIMATIONS ── */
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,.4);}
  50%{box-shadow:0 0 0 8px rgba(0,230,118,0);}
}

/* ── EMPTY CART ── */
.empty-cart{
  text-align:center;padding:28px;
  font-size:12px;color:var(--muted);
}

/* ── FOOTER ── */
.page-footer{
  padding:28px 20px;border-top:1px solid var(--border);
  text-align:center;
}
.footer-logo{
  font-family:var(--font);font-weight:900;font-size:24px;
  color:var(--muscle);letter-spacing:-1px;margin-bottom:6px;
}
.footer-tagline{font-size:11px;color:var(--muted);}

/* ── RESPONSIVE ── */
@media(min-width:480px){
  .meal-grid{grid-template-columns:repeat(3,1fr);}
  .meal-card.wide{flex-direction:column;}
  .meal-card.wide .meal-img{width:100%;aspect-ratio:4/3;}
  .sub-plans{flex-direction:row;}
  .sub-plan{flex:1;}
}
@media(min-width:760px){
  .meal-grid{grid-template-columns:repeat(4,1fr);}
  .meal-card.wide{grid-column:span 2;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">SAVY<span>menu</span></div>
  <div class="nav-city" id="nav-city">Tétouan · Fast Delivery</div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">ع</button>
  </div>
  <button class="nav-cart-mini" onclick="toggleCart()">
    🛒
    <span id="nav-cart-count">0 items</span>
    <span class="cart-count-badge" id="cart-count-badge">0</span>
  </button>
</nav>

<!-- SECTION NAV -->
